<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuthentiSip Admin</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap");
      :root {
        --bg: #f5f1e8;
        --card: #ffffff;
        --text: #1c1a16;
        --muted: #6b6257;
        --accent: #b85c2b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        background: radial-gradient(circle at 15% 15%, #fff 0%, var(--bg) 45%, #efe7db 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 30px 18px 50px;
      }
      .header {
        text-align: center;
      }
      h1 {
        font-family: "Playfair Display", serif;
        margin: 0 0 6px;
      }
      .sub {
        color: var(--muted);
        margin-bottom: 10px;
      }
      .link {
        color: var(--accent);
        text-decoration: none;
      }
      .card {
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        margin-top: 18px;
      }
      .card.centered {
        text-align: center;
      }
      .card.narrow {
        max-width: 560px;
        margin-left: auto;
        margin-right: auto;
      }
      .scanner-shell {
        max-width: 360px;
        margin: 16px auto 0;
        padding: 12px;
        border-radius: 16px;
        background: #fbf7f0;
        border: 1px solid #eadfce;
      }
      #admin-reader {
        width: 100%;
        min-height: 260px;
      }
      .placeholder {
        min-height: 260px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        border-radius: 12px;
        color: var(--muted);
        background: linear-gradient(180deg, #fffdf8, #f7efe4);
        line-height: 1.5;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        margin: 8px 0 12px;
        border-radius: 8px;
        border: 1px solid #d7cdbd;
        font-family: inherit;
      }
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 10px 14px;
        border-radius: 8px;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid #d4b399;
      }
      .kv {
        margin: 4px 0;
        color: var(--muted);
      }
      img.qr {
        max-width: 220px;
        display: block;
        margin: 10px auto 0;
      }
      .scanner-actions {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <h1>Admin Ledger</h1>
        <div class="sub">Add trusted products to the ledger. Public users only scan.</div>
        <a class="link" href="/">Go to Public Scanner</a>
      </div>

      <div class="card narrow">
        <div class="kv">Barcode value becomes the trusted identity.</div>
        <input id="product-id" placeholder="Barcode value (product_id)" />
        <input id="name" placeholder="Product name (default: Test Product)" />
        <input id="batch" placeholder="Batch ID (default: BATCH-001)" />
        <button id="register-btn">Add Product</button>
        <div id="register-result"></div>
      </div>

      <div class="card centered narrow">
        <div class="kv">Scan a barcode or QR to auto-fill the product ID.</div>
        <div class="scanner-shell">
          <div id="admin-reader">
            <div class="placeholder">Tap "Scan Barcode" when you want to capture the barcode value.</div>
          </div>
        </div>
        <div class="scanner-actions">
          <button id="scan-admin-button">Scan Barcode</button>
          <button id="scan-admin-again" class="secondary" disabled>Scan Again</button>
        </div>
      </div>
    </div>

    <script>
      const registerBtn = document.getElementById("register-btn");
      const registerResult = document.getElementById("register-result");
      const productIdInput = document.getElementById("product-id");
      const adminReaderEl = document.getElementById("admin-reader");
      const scanAdminButton = document.getElementById("scan-admin-button");
      const scanAdminAgainBtn = document.getElementById("scan-admin-again");
      let adminScannerStarted = false;
      let adminScanner = null;
      let adminScanLocked = false;

      function showAdminScannerPlaceholder(message) {
        adminReaderEl.innerHTML = `<div class="placeholder">${message}</div>`;
      }

      function extractProductId(text) {
        if (!text) return null;
        try {
          const url = new URL(text);
          const pid = url.searchParams.get("product_id");
          if (pid) return pid.trim();
          const parts = url.pathname.split("/").filter(Boolean);
          if (parts.length) return parts[parts.length - 1].trim();
        } catch (err) {}
        if (text.includes("product_id=")) {
          const match = text.split("product_id=")[1];
          if (match) return match.split("&")[0].trim();
        }
        return text.trim();
      }

      registerBtn.addEventListener("click", async () => {
        registerBtn.disabled = true;
        registerResult.textContent = "Registering...";
        const productId = productIdInput.value.trim();
        const name = document.getElementById("name").value.trim();
        const batchId = document.getElementById("batch").value.trim();

        const res = await fetch("/admin/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ product_id: productId || undefined, name: name, batch_id: batchId })
        });
        const data = await res.json();

        if (data.product) {
          registerResult.innerHTML = `
            <div class="kv">Added: ${data.product.name} (${data.product.batch_id})</div>
            <div class="kv">Product ID: ${data.product.id}</div>
            <img class="qr" src="${data.qr_url}" alt="QR Code" />
          `;
        } else {
          registerResult.textContent = data.error || "Registration failed";
        }

        registerBtn.disabled = false;
      });

      async function stopAdminCamera(message) {
        if (!adminScannerStarted || !adminScanner) {
          showAdminScannerPlaceholder(message || 'Tap "Scan Barcode" when you want to scan and fill the product ID.');
          return;
        }

        try {
          await adminScanner.clear();
        } catch (err) {}

        adminScanner = null;
        adminScannerStarted = false;
        scanAdminButton.disabled = false;
        showAdminScannerPlaceholder(message || 'Tap "Scan Barcode" when you want to scan and fill the product ID.');
      }

      function startAdminScan() {
        if (adminScannerStarted) return;
        adminScannerStarted = true;
        adminScanLocked = false;
        scanAdminButton.disabled = true;
        adminReaderEl.innerHTML = "";

        adminScanner = new Html5QrcodeScanner(
          "admin-reader",
          {
            fps: 18,
            qrbox: { width: 280, height: 180 },
            rememberLastUsedCamera: true,
            showTorchButtonIfSupported: true,
            showZoomSliderIfSupported: true,
            experimentalFeatures: { useBarCodeDetectorIfSupported: true },
            formatsToSupport: [
              Html5QrcodeSupportedFormats.CODE_128,
              Html5QrcodeSupportedFormats.CODE_39,
              Html5QrcodeSupportedFormats.EAN_13,
              Html5QrcodeSupportedFormats.EAN_8,
              Html5QrcodeSupportedFormats.UPC_A,
              Html5QrcodeSupportedFormats.UPC_E,
              Html5QrcodeSupportedFormats.QR_CODE
            ]
          },
          false
        );

        adminScanner.render(async (decodedText) => {
          if (adminScanLocked) return;
          const pid = extractProductId(decodedText);
          if (!pid) return;
          adminScanLocked = true;
          productIdInput.value = pid;
          scanAdminAgainBtn.disabled = false;
          await stopAdminCamera('Scan complete. Tap "Scan Again" to scan another barcode.');
        });
      }

      scanAdminButton.addEventListener("click", startAdminScan);
      scanAdminAgainBtn.addEventListener("click", () => {
        adminScanLocked = false;
        scanAdminAgainBtn.disabled = true;
        stopAdminCamera('Tap "Scan Barcode" when you want to scan and fill the product ID.');
        startAdminScan();
      });
    </script>
  </body>
</html>
